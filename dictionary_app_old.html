<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বরাক উপত্যকার আঞ্চলিক বাংলা ভাষার অভিধান</title>
<style>
  :root {
    --bg: #ffffff;
    --card-bg: #ffffff;
    --border: #dcdcdc;
    --accent: #052962;
    --accent-light: #506991;
    --accent-highlight: #c70000;
    --brand-yellow: #ffe500;
    --text: #121212;
    --text-light: #707070;
    --highlight: #ffe500;
    --shadow: rgba(18,18,18,0.04);
    --pos-bg: #f0f0f0;
    --example-bg: #fafafa;
    --nav-bg: #052962;
    --nav-text: #ffffff;
    --rule: #c6c6c6;
    --serif: 'Noto Serif Bengali', Georgia, 'Times New Roman', serif;
    --sans: 'Noto Sans Bengali', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--serif);
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Masthead ─────────────────────────────────────────── */
  .masthead {
    background: var(--nav-bg);
    color: var(--nav-text);
    text-align: center;
    padding: 18px 24px 14px;
    border-bottom: 4px solid var(--brand-yellow);
  }
  .masthead h1 {
    font-family: var(--serif);
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.3;
  }
  .masthead .subtitle {
    font-family: var(--sans);
    font-size: 0.72rem;
    color: rgba(255,255,255,0.55);
    margin-top: 2px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* ─── Toolbar (under masthead) ─────────────────────────── */
  .toolbar {
    background: #fff;
    border-bottom: 1px solid var(--rule);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 44px;
  }
  .mode-toggle {
    display: flex;
    gap: 0;
    margin-right: auto;
  }
  .mode-btn {
    padding: 10px 22px;
    border: none;
    background: transparent;
    color: var(--text-light);
    cursor: pointer;
    font-size: 0.88rem;
    font-family: var(--sans);
    font-weight: 600;
    transition: all 0.15s;
    border-bottom: 3px solid transparent;
    line-height: 1;
  }
  .mode-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .mode-btn:hover:not(.active) {
    color: var(--text);
  }

  .stats {
    font-family: var(--sans);
    font-size: 0.73rem;
    color: var(--text-light);
    white-space: nowrap;
  }

  .settings-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    color: var(--text-light);
    flex-shrink: 0;
  }
  .settings-bar button {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--text-light);
    font-size: 0.72rem;
    padding: 4px 12px;
    border-radius: 100px;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 600;
    transition: all 0.15s;
  }
  .settings-bar button:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .user-name {
    font-family: var(--sans);
    color: var(--text-light);
    font-size: 0.75rem;
    cursor: pointer;
    font-weight: 600;
  }
  .user-name:hover { color: var(--accent); }

  /* ─── Dictionary Mode (search + book unified) ─────────── */
  .search-box {
    position: sticky;
    top: 44px;
    z-index: 90;
    background: var(--bg);
    padding: 16px 24px 10px;
    border-bottom: 1px solid var(--rule);
  }
  .search-input-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .search-input-wrap input {
    flex: 1;
    padding: 13px 18px;
    font-size: 1.05rem;
    font-family: var(--sans);
    border: 1px solid var(--rule);
    border-radius: 0;
    outline: none;
    background: #fff;
    transition: border-color 0.2s;
  }
  .search-input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: inset 0 0 0 1px var(--accent);
  }
  .search-input-wrap input::placeholder { color: #bbb; }

  .search-filters {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
    align-items: center;
    font-family: var(--sans);
  }
  .search-filters label {
    font-size: 0.8rem;
    color: var(--text-light);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 500;
  }
  .search-filters input[type="radio"] { accent-color: var(--accent); }
  .result-count {
    margin-left: auto;
    font-size: 0.78rem;
    color: var(--text-light);
    font-family: var(--sans);
    font-weight: 600;
  }

  /* ─── Entry Cards ──────────────────────────────────────── */
  .entry-card {
    background: var(--card-bg);
    border-top: 1px solid var(--accent);
    padding: 22px 0;
    margin-bottom: 0;
    border-radius: 0;
    box-shadow: none;
    transition: none;
    position: relative;
  }
  .entry-card + .entry-card {
    border-top: 1px solid var(--rule);
  }
  .entry-card:first-child {
    border-top: 2px solid var(--accent);
  }

  .entry-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 10px;
    border-bottom: none;
    padding-bottom: 0;
  }
  .headword {
    font-family: var(--serif);
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .transliteration {
    font-family: var(--sans);
    font-size: 0.88rem;
    color: var(--text-light);
    font-style: italic;
  }
  .phonetics {
    font-size: 0.88rem;
    color: var(--accent-light);
    font-family: 'Noto Sans', 'Segoe UI', sans-serif;
  }
  .phonetics::before { content: '/'; }
  .phonetics::after { content: '/'; }

  .speak-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    color: #bbb;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
    vertical-align: baseline;
  }
  .speak-btn:hover { color: var(--accent); }
  .speak-btn.speaking { color: var(--accent-highlight); }

  .etymology {
    font-family: var(--sans);
    font-size: 0.82rem;
    color: var(--text-light);
    margin-bottom: 10px;
    font-style: italic;
  }

  .sense {
    margin: 12px 0;
    padding-left: 18px;
    border-left: 3px solid var(--brand-yellow);
  }
  .sense-number {
    font-family: var(--sans);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    margin-right: 6px;
  }
  .pos-tag {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 1px 10px;
    border-radius: 100px;
    font-size: 0.72rem;
    font-weight: 700;
    font-family: var(--sans);
    margin-right: 8px;
    letter-spacing: 0.3px;
  }
  .definition {
    font-size: 1rem;
    margin-top: 4px;
    line-height: 1.7;
  }
  .example {
    background: transparent;
    border-left: 2px solid var(--rule);
    padding: 5px 14px;
    margin: 8px 0;
    font-size: 0.88rem;
    color: var(--text-light);
    border-radius: 0;
    font-style: italic;
  }
  .example::before {
    content: '⇒ ';
    color: var(--accent-light);
    font-weight: 600;
    font-style: normal;
  }
  .cross-ref {
    font-family: var(--sans);
    font-size: 0.82rem;
    color: var(--accent-highlight);
    margin-top: 4px;
  }
  .cross-ref a {
    color: var(--accent-highlight);
    text-decoration: none;
    border-bottom: 1px solid currentColor;
    cursor: pointer;
  }
  .cross-ref a:hover { color: var(--accent); }

  .raw-text {
    font-size: 0.88rem;
    color: var(--text-light);
    padding: 6px 0;
  }

  .notes {
    margin-top: 12px;
    padding: 12px 16px;
    background: #fff8e1;
    border-radius: 0;
    font-size: 0.83rem;
    color: #5d4037;
    border-left: 3px solid #f9a825;
    font-family: var(--sans);
  }
  .notes::before {
    content: '📝 ';
  }

  .source-page {
    text-align: right;
    font-family: var(--sans);
    font-size: 0.7rem;
    color: var(--text-light);
    margin-top: 10px;
    letter-spacing: 0.3px;
  }
  .source-page a {
    color: var(--text-light);
    text-decoration: none;
    border-bottom: 1px dotted var(--rule);
    transition: color 0.15s;
  }
  .source-page a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .highlight {
    background: var(--brand-yellow);
    color: var(--text);
    padding: 0 2px;
    border-radius: 0;
  }

  /* ─── Edit Feature ──────────────────────────────────────── */
  .edit-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.75rem;
    color: #ccc;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
    font-family: var(--sans);
  }
  .edit-btn:hover { color: var(--accent); }
  .entry-card.edited { border-left: 3px solid #2e7d32; padding-left: 20px; }
  .book-entry.edited { border-left: 3px solid #2e7d32; padding-left: 14px; }
  .edited-badge {
    display: inline-block;
    background: #e8f5e9;
    color: #2e7d32;
    font-size: 0.62rem;
    padding: 1px 8px;
    border-radius: 100px;
    margin-left: 8px;
    vertical-align: middle;
    font-family: var(--sans);
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  /* ─── Edit Modal ────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,41,98,0.55);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal {
    background: #fff;
    border-radius: 0;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 16px 48px rgba(5,41,98,0.3);
    border-top: 4px solid var(--brand-yellow);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--rule);
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .modal-header h2 {
    font-family: var(--serif);
    font-size: 1.1rem;
    color: var(--accent);
    font-weight: 700;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #999;
    padding: 4px 8px;
    border-radius: 0;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--accent); }
  .modal-body {
    padding: 24px 28px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--accent-light);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input, .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--rule);
    border-radius: 0;
    font-family: var(--serif);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--accent);
    box-shadow: inset 0 0 0 1px var(--accent);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .sense-edit-group {
    border: 1px solid var(--rule);
    border-radius: 0;
    border-left: 3px solid var(--brand-yellow);
    padding: 14px 16px;
    margin-bottom: 12px;
    background: #fafafa;
  }
  .sense-edit-group h4 {
    font-family: var(--sans);
    font-size: 0.8rem;
    color: var(--accent);
    margin-bottom: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .modal-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px;
    border-top: 1px solid var(--rule);
    background: #fafafa;
    gap: 10px;
    flex-wrap: wrap;
    position: sticky;
    bottom: 0;
    z-index: 10;
  }
  .modal-footer .btn {
    padding: 9px 22px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 0.82rem;
    font-weight: 700;
    transition: opacity 0.15s;
    letter-spacing: 0.3px;
  }
  .modal-footer .btn:hover { opacity: 0.85; }
  .btn-save { background: var(--accent); color: #fff; }
  .btn-cancel { background: transparent; color: var(--text-light); border: 1px solid var(--rule) !important; }
  .btn-cancel:hover { background: #f0f0f0 !important; }
  .btn-revert { background: #e65100; color: #fff; }
  .btn-history { background: var(--accent-light); color: #fff; }
  .btn-export { background: #1b5e20; color: #fff; }
  .btn-import { background: #4527a0; color: #fff; }
  .btn-sm { padding: 6px 14px; font-size: 0.75rem; }

  /* ─── History Modal ─────────────────────────────────────── */
  .history-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--rule);
  }
  .history-item:last-child { border-bottom: none; }
  .history-meta {
    font-family: var(--sans);
    font-size: 0.72rem;
    color: var(--text-light);
    margin-bottom: 4px;
  }
  .history-meta strong { color: var(--accent); }
  .history-changes {
    font-size: 0.85rem;
    color: var(--text);
  }
  .history-changes .field-name {
    font-weight: 700;
    color: var(--accent);
  }

  /* ─── Prabad Mode ──────────────────────────────────────── */
  #bookMode {
    max-width: 820px;
    margin: 0 auto;
    padding: 0;
  }
  #prabadMode {
    max-width: 820px;
    margin: 0 auto;
    padding: 0;
    display: none;
  }
  .prabad-search-box {
    position: sticky;
    top: 44px;
    z-index: 90;
    background: var(--bg);
    padding: 16px 24px 10px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .prabad-search-box input {
    flex: 1;
    padding: 10px 16px;
    font-size: 0.95rem;
    font-family: var(--sans);
    border: 1px solid var(--rule);
    border-radius: 0;
    outline: none;
    background: #fff;
  }
  .prabad-search-box input:focus {
    border-color: var(--accent);
    box-shadow: inset 0 0 0 1px var(--accent);
  }
  .prabad-stats {
    font-family: var(--sans);
    font-size: 0.75rem;
    color: var(--text-light);
    white-space: nowrap;
  }
  .letter-nav.prabad-nav {
    top: 100px;
  }
  #prabadContent {
    padding: 20px 28px;
  }
  .prabad-section {
    margin-bottom: 40px;
  }
  .prabad-section-heading {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .prabad-section-heading::after {
    content: '';
    display: block;
    height: 4px;
    background: var(--brand-yellow);
    width: 40px;
    margin-top: 4px;
  }
  .prabad-item {
    padding: 12px 0;
    border-bottom: 1px solid #eee;
    display: flex;
    gap: 12px;
    align-items: baseline;
  }
  .prabad-item:last-child { border-bottom: none; }
  .prabad-sno {
    font-family: var(--sans);
    font-size: 0.78rem;
    color: var(--accent-light);
    font-weight: 700;
    min-width: 32px;
    text-align: right;
    flex-shrink: 0;
  }
  .prabad-text {
    font-family: var(--serif);
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-line;
  }
  .prabad-text .highlight {
    background: var(--highlight);
    padding: 0 2px;
  }
  .prabad-source {
    font-family: var(--sans);
    font-size: 0.68rem;
    color: var(--text-light);
    margin-left: auto;
    flex-shrink: 0;
  }
  .prabad-source a { color: var(--accent-light); text-decoration: none; }
  .prabad-source a:hover { text-decoration: underline; }

  .letter-nav {
    position: sticky;
    top: 100px;
    z-index: 89;
    background: #fff;
    border-bottom: 1px solid var(--rule);
    padding: 8px 16px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4px;
  }

  .letter-btn {
    padding: 5px 10px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background: #fff;
    color: var(--text-light);
    font-family: var(--sans);
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 600;
  }
  .letter-btn:hover {
    background: #f0f0f0;
    color: var(--accent);
    border-color: var(--accent-light);
  }
  .letter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 700;
  }
  .letter-count {
    font-size: 0.55rem;
    display: block;
    opacity: 0.6;
  }

  #bookContent {
    padding: 28px 32px;
  }

  .letter-section {
    margin-bottom: 48px;
  }
  .letter-heading {
    font-family: var(--serif);
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--accent);
    border-bottom: none;
    padding-bottom: 8px;
    margin-bottom: 4px;
    background: transparent;
    z-index: 80;
  }
  .letter-heading::after {
    content: '';
    display: block;
    height: 4px;
    background: var(--brand-yellow);
    width: 48px;
    margin-top: 6px;
  }

  .book-entry {
    padding: 16px 0;
    border-bottom: 1px solid #e8e8e8;
  }
  .book-entry:last-child { border-bottom: none; }
  .book-headword {
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    display: inline;
  }
  .book-translit {
    font-family: var(--sans);
    font-style: italic;
    color: var(--text-light);
    font-size: 0.85rem;
    margin-left: 8px;
  }
  .book-phonetics {
    color: var(--accent-light);
    font-size: 0.85rem;
    margin-left: 6px;
    font-family: 'Noto Sans', sans-serif;
  }
  .book-etymology {
    font-style: italic;
    color: var(--text-light);
    font-size: 0.82rem;
    margin-left: 8px;
  }
  .book-sense {
    margin: 5px 0 5px 20px;
  }
  .book-pos {
    font-family: var(--sans);
    font-weight: 700;
    color: var(--accent-light);
    font-size: 0.85rem;
  }
  .book-def { font-size: 0.93rem; }
  .book-example {
    margin-left: 20px;
    font-size: 0.85rem;
    color: var(--text-light);
    font-style: italic;
  }
  .book-example::before { content: '⇒ '; color: var(--accent-light); font-style: normal; }
  .book-notes {
    margin: 6px 0 0 20px;
    font-size: 0.8rem;
    color: #5d4037;
    font-style: italic;
  }
  .book-crossref {
    margin-left: 20px;
    font-size: 0.82rem;
    color: var(--accent-highlight);
    font-family: var(--sans);
  }

  /* ─── Loading ──────────────────────────────────────────── */
  .loading {
    text-align: center;
    padding: 80px;
    color: var(--text-light);
    font-size: 1.1rem;
    font-family: var(--sans);
  }
  .spinner {
    display: inline-block;
    width: 28px;
    height: 28px;
    border: 3px solid var(--rule);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-results {
    text-align: center;
    padding: 48px;
    color: var(--text-light);
    font-size: 1rem;
    font-family: var(--sans);
  }

  /* ─── Back to top ──────────────────────────────────────── */
  .back-to-top {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 42px;
    height: 42px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(5,41,98,0.35);
    display: none;

<script>
// ─── Error Handler for debugging ────────────────────────────────────
window.onerror = function(msg, url, line, col, err) {
  console.error('JS Error:', msg, 'at line', line, ':', col, err);
};

// ─── Global State ───────────────────────────────────────────────────
let allEntries = [];
let originalEntries = [];  // untouched originals
let letterGroups = {};
let currentMode = 'book';
let searchTimeout = null;
let bookRendered = false;
let prabadEntries = [];
let prabadRendered = false;
let prabadSearchTimeout = null;

// Bengali letter order for sorting
const BN_ORDER = 'অআইঈউঊঋএঐওঔকখগঘঙচছজঝঞটঠডঢণতথদধনপফবভমযরলশষসহড়ঢ়য়ৎংঃঁৰ';

// ─── Edit Storage ───────────────────────────────────────────────────
const EDITS_KEY = 'dict_edits_v1';
const USER_KEY = 'dict_user_name';

function getEdits() {
  try { return JSON.parse(localStorage.getItem(EDITS_KEY) || '{}'); }
  catch { return {}; }
}
function saveEdits(edits) {
  localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
}

function getEntryKey(entry) {
  // Unique key: original headword + source_page
  return (entry._originalHeadword || entry.headword || '') + '|' + (entry.source_page || '');
}

function getUserName() {
  return localStorage.getItem(USER_KEY) || '';
}
function setUserName(name) {
  localStorage.setItem(USER_KEY, name);
  updateUserDisplay();
}
function updateUserDisplay() {
  const name = getUserName();
  const el = document.getElementById('userDisplay');
  el.textContent = name ? `👤 ${name}` : '👤 সাইন ইন';
}

/* ─── Name / Login Modal ────────────────────────────────── */
function openNameModal(callback) {
  const container = document.getElementById('nameModalContainer');
  container.innerHTML = '';
  const overlay = document.createElement('div');
  overlay.className = 'name-modal-overlay';
  const box = document.createElement('div');
  box.className = 'name-modal';

  const h3 = document.createElement('h3');
  h3.textContent = 'আপনার নাম লিখুন';
  box.appendChild(h3);

  const p = document.createElement('p');
  p.textContent = 'সম্পাদনা ট্র্যাক করতে আপনার নাম দিন, অথবা Google দিয়ে সাইন ইন করুন।';
  box.appendChild(p);

  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.placeholder = 'আপনার নাম...';
  nameInput.value = getUserName();
  box.appendChild(nameInput);

  const saveBtn = document.createElement('button');
  saveBtn.className = 'name-btn name-btn-primary';
  saveBtn.textContent = '✓ সংরক্ষণ করুন';
  saveBtn.onclick = function() {
    const val = nameInput.value.trim();
    setUserName(val || 'Anonymous');
    closeNameModal();
    if (callback) callback();
  };
  box.appendChild(saveBtn);

  // Divider
  const divider = document.createElement('div');
  divider.className = 'divider';
  divider.textContent = 'অথবা';
  box.appendChild(divider);

  // Google Sign-In button
  const googleBtn = document.createElement('button');
  googleBtn.className = 'google-btn';
  googleBtn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G"> Google দিয়ে সাইন ইন';
  googleBtn.onclick = function() { startGoogleSignIn(callback); };
  box.appendChild(googleBtn);

  // Skip button
  const skipDiv = document.createElement('div');
  skipDiv.style.marginTop = '12px';
  const skipBtn = document.createElement('button');
  skipBtn.className = 'name-btn name-btn-skip';
  skipBtn.textContent = 'বাদ দিন (Anonymous)';
  skipBtn.onclick = function() {
    setUserName('Anonymous');
    closeNameModal();
    if (callback) callback();
  };
  skipDiv.appendChild(skipBtn);
  box.appendChild(skipDiv);

  overlay.appendChild(box);
  container.appendChild(overlay);
  nameInput.focus();

  // Enter key to save
  nameInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') saveBtn.click();
  });
}

function closeNameModal() {
  document.getElementById('nameModalContainer').innerHTML = '';
}

/* ─── Google Sign-In ────────────────────────────────────── */
const GOOGLE_CLIENT_ID = localStorage.getItem('dict_google_client_id') || '';

function startGoogleSignIn(callback) {
  if (!GOOGLE_CLIENT_ID) {
    // No client ID configured — prompt user to enter one or use manual name
    const cid = prompt(
      'Google Sign-In সেটআপ:\n\n'
      + '1. https://console.cloud.google.com/ যান\n'
      + '2. APIs & Services → Credentials → OAuth 2.0 Client ID তৈরি করুন\n'
      + '3. Authorized JavaScript origins এ http://localhost:8080 যোগ করুন\n'
      + '4. Client ID এখানে পেস্ট করুন:'
    );
    if (cid && cid.trim()) {
      localStorage.setItem('dict_google_client_id', cid.trim());
      location.reload();
    }
    return;
  }
  try {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: function(response) { handleGoogleCredential(response, callback); },
      auto_select: false
    });
    google.accounts.id.prompt();
  } catch (err) {
    alert('Google Sign-In ত্রুটি: ' + err.message + '\nনাম ম্যানুয়ালি লিখুন।');
  }
}

function handleGoogleCredential(response, callback) {
  try {
    // Decode JWT payload (base64url)
    const parts = response.credential.split('.');
    const payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
    const name = payload.name || payload.email || 'Google User';
    setUserName(name);
    localStorage.setItem('dict_user_email', payload.email || '');
    localStorage.setItem('dict_user_picture', payload.picture || '');
    closeNameModal();
    if (callback) callback();
  } catch(err) {
    alert('Google credential parse error: ' + err.message);
  }
}

function changeUserName() {
  openNameModal();
}

function ensureUserName() {
  if (!getUserName()) {
    openNameModal();
    return false;
  }
  return true;
}

// Apply saved edits to entries after loading
function applyEdits() {
  const edits = getEdits();
  for (const entry of allEntries) {
    const key = getEntryKey(entry);
    if (edits[key] && edits[key].versions && edits[key].versions.length > 0) {
      const latest = edits[key].versions[edits[key].versions.length - 1].data;
      // Save original headword for key stability
      entry._originalHeadword = edits[key].originalHeadword || entry.headword;
      // Apply latest edit
      Object.assign(entry, latest);
      entry._edited = true;
    }
  }
}

// ─── Load Data ──────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('bookContent').innerHTML = '<div class="loading"><div class="spinner"></div><br>অভিধান লোড হচ্ছে...</div>';

  try {
    // Load original entries
    const resp = await fetch('abhidhan/ParsedJSON_Merged/all_entries.json');
    if (!resp.ok) throw new Error('Failed to load entries');
    allEntries = await resp.json();

    // Store originals (deep copy)
    originalEntries = JSON.parse(JSON.stringify(allEntries));
    // Set original headword for key stability
    for (const e of allEntries) {
      e._originalHeadword = e.headword;
    }

    // Load server-side edits and merge
    let serverEditCount = 0;
    try {
      const editsResp = await fetch('abhidhan/ParsedJSON_Merged/edits.json');
      if (editsResp.ok) {
        const serverEdits = await editsResp.json();
        // Merge server edits into entries
        for (const [key, edit] of Object.entries(serverEdits)) {
          if (!edit.latest) continue;
          const origHw = edit.originalHeadword;
          const sp = edit.source_page;
          const entry = allEntries.find(e => e.headword === origHw && e.source_page === sp);
          if (entry) {
            for (const field of ['headword', 'transliteration', 'phonetics', 'etymology', 'notes', 'senses']) {
              if (field in edit.latest) {
                entry[field] = edit.latest[field];
              }
            }
            entry._edited = true;
            serverEditCount++;
          }
        }
      }
    } catch (e) {
      // edits.json may not exist yet — that's fine
      console.log('No server edits file found (this is normal on first run)');
    }

    // Also apply localStorage edits (local backup/offline edits)
    applyEdits();

    // Sort entries by Bengali headword
    allEntries.sort((a, b) => {
      const ha = a.headword || '';
      const hb = b.headword || '';
      return compareBengali(ha, hb);
    });

    // Group by first letter
    letterGroups = {};
    for (const entry of allEntries) {
      const hw = entry.headword || '';
      if (!hw) continue;
      const first = hw[0];
      if (!letterGroups[first]) letterGroups[first] = [];
      letterGroups[first].push(entry);
    }

    const localEditCount = Object.keys(getEdits()).length;
    const totalEdits = Math.max(serverEditCount, localEditCount);
    document.getElementById('statsText').textContent = `${allEntries.length} শব্দ` + (totalEdits ? ` · ${totalEdits} সম্পাদিত` : '');
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('bookContent').innerHTML = '';
    showAllEntries();

  } catch (err) {
    document.getElementById('bookContent').innerHTML =
      `<div class="no-results">অভিধান লোড করতে ব্যর্থ।<br><small>Make sure to run <code>python server.py 8080</code></small></div>`;
  }
}

function compareBengali(a, b) {
  for (let i = 0; i < Math.max(a.length, b.length); i++) {
    const ca = i < a.length ? a[i] : '';
    const cb = i < b.length ? b[i] : '';
    const ia = BN_ORDER.indexOf(ca);
    const ib = BN_ORDER.indexOf(cb);
    const oa = ia >= 0 ? ia : 900 + ca.charCodeAt(0);
    const ob = ib >= 0 ? ib : 900 + cb.charCodeAt(0);
    if (oa !== ob) return oa - ob;
  }
  return a.length - b.length;
}

// ─── Search ─────────────────────────────────────────────────────────
function showAllEntries() {
  // Show book view when no search query
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('bookContent').style.display = 'block';
  document.getElementById('letterNav').style.display = 'flex';
  document.getElementById('resultCount').textContent = `সর্বমোট ${allEntries.length} শব্দ`;
  renderBook();
}

document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => performSearch(this.value), 150);
});

document.addEventListener('change', function(e) {
  if (e.target.name === 'searchField') {
    performSearch(document.getElementById('searchInput').value);
  }
});

function performSearch(query) {
  query = query.trim();
  if (!query) {
    showAllEntries();
    return;
  }

  // Switch to search results view
  document.getElementById('searchResults').style.display = 'block';
  document.getElementById('bookContent').style.display = 'none';
  document.getElementById('letterNav').style.display = 'none';

  const field = document.querySelector('input[name="searchField"]:checked').value;
  const q = query.toLowerCase();
  const results = [];

  for (const entry of allEntries) {
    if (matchEntry(entry, q, field)) {
      results.push(entry);
      if (results.length >= 200) break;
    }
  }

  renderSearchResults(results, query);
  const suffix = results.length >= 200 ? ' (সর্বাধিক ২০০)' : '';
  document.getElementById('resultCount').textContent = `${results.length} ফলাফল${suffix}`;
}

function matchEntry(entry, q, field) {
  if (field === 'all' || field === 'headword') {
    if ((entry.headword || '').toLowerCase().includes(q)) return true;
  }
  if (field === 'all' || field === 'transliteration') {
    if ((entry.transliteration || '').toLowerCase().includes(q)) return true;
  }
  if (field === 'all' || field === 'phonetics') {
    if ((entry.phonetics || '').toLowerCase().includes(q)) return true;
  }
  if (field === 'all' || field === 'definition') {
    for (const s of (entry.senses || [])) {
      if ((s.definition || '').toLowerCase().includes(q)) return true;
      if ((s.raw_text || '').toLowerCase().includes(q)) return true;
    }
  }
  return false;
}

function renderSearchResults(entries, query) {
  const container = document.getElementById('searchResults');
  if (!entries.length) {
    container.innerHTML = '<div class="no-results">কোনো ফলাফল পাওয়া যায়নি।</div>';
    return;
  }
  const html = entries.map(e => renderEntryCard(e, query)).join('');
  container.innerHTML = html;
}

function renderEntryCard(entry, query) {
  const idx = allEntries.indexOf(entry);
  const hw = hl(entry.headword || '', query);
  const tr = hl(entry.transliteration || '', query);
  const ph = entry.phonetics || '';
  const etym = entry.etymology || '';
  const isEdited = !!entry._edited;

  let html = `<div class="entry-card${isEdited ? ' edited' : ''}">`;
  html += `<div class="entry-header">`;
  html += `<span class="headword">${hw}</span>`;
  if (tr) html += `<span class="transliteration">${tr}</span>`;
  if (ph) html += `<span class="phonetics">${esc(ph)}</span>`;
  html += `<button class="speak-btn" onclick="speak('${escAttr(entry.headword || '')}','${escAttr(ph)}')" title="উচ্চারণ শুনুন">&#128264;</button>`;
  html += `<button class="edit-btn" onclick="openEditModal(${idx})" title="সম্পাদনা করুন">✏️ সম্পাদনা</button>`;
  if (isEdited) html += `<span class="edited-badge">সম্পাদিত</span>`;
  html += `</div>`;

  if (etym) html += `<div class="etymology">${esc(etym)}</div>`;

  const senses = entry.senses || [];
  const showNum = senses.length > 1;

  senses.forEach((s, i) => {
    html += `<div class="sense">`;
    if (showNum) html += `<span class="sense-number">${i + 1}.</span>`;
    if (s.part_of_speech) html += `<span class="pos-tag">${esc(s.part_of_speech)}</span>`;
    if (s.definition) html += `<div class="definition">${hl(s.definition, query)}</div>`;
    if (s.raw_text) html += `<div class="raw-text">${hl(s.raw_text, query)}</div>`;
    if (s.examples) {
      for (const ex of s.examples) {
        html += `<div class="example">${esc(ex)}</div>`;
      }
    }
    if (s.cross_references && s.cross_references.length) {
      html += `<div class="cross-ref">দ্র. ${s.cross_references.map(
        cr => `<a onclick="searchWord('${escAttr(cr)}')">${esc(cr)}</a>`
      ).join(', ')}</div>`;
    }
    html += `</div>`;
  });

  if (entry.notes) {
    html += `<div class="notes">${esc(entry.notes)}</div>`;
  }

  const sp = entry.source_page || '';
  const pageNum = sp.replace('IMG_0', '').replace('IMG_', '');
  const imgPath = `Images/Barak%20Upatyakar%20Ancholik%20Bhashar%20Abhidhan%20O%20Bhashatatwa%20-%20Copy/${sp}.jpg`;
  html += `<div class="source-page"><a href="${imgPath}" target="_blank" title="পৃষ্ঠার ছবি দেখুন">Source page ${pageNum}</a></div>`;
  html += `</div>`;
  return html;
}

function searchWord(word) {
  document.getElementById('searchInput').value = word;
  switchMode('book');
  performSearch(word);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  // Escape for use inside HTML attribute values (single-quoted onclick etc.)
  return (s || '').replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function hl(text, query) {
  if (!query || !text) return esc(text);
  const escaped = esc(text);
  const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  try {
    return escaped.replace(new RegExp(`(${q})`, 'gi'), '<span class="highlight">$1</span>');
  } catch {
    return escaped;
  }
}

function openEditModal(idx) {
  try {

      openNameModal(function() { openEditModal(idx); });
      return;
    }

    const entry = allEntries[idx];
    if (!entry) { alert('Entry not found at index ' + idx); return; }
    const senses = entry.senses || [];

    // Build sense forms using DOM (avoids innerHTML escaping issues)
    const container = document.getElementById('editModalContainer');
    container.innerHTML = '';

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'editModal';
    overlay.addEventListener('click', function(ev) { if (ev.target === overlay) closeEditModal(); });

    const modal = document.createElement('div');
    modal.className = 'modal';

    // Header
    const header = document.createElement('div');
    header.className = 'modal-header';
    header.innerHTML = `<h2>✏️ সম্পাদনা: ${esc(entry.headword || '')}</h2>`;
    const closeBtn = document.createElement('button');
    closeBtn.className = 'modal-close';
    closeBtn.innerHTML = '&times;';
    closeBtn.onclick = closeEditModal;
    header.appendChild(closeBtn);
    modal.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'modal-body';

    function addField(parent, labelText, id, value, isTextarea, rows) {
      const grp = document.createElement('div');
      grp.className = 'form-group';
      const lbl = document.createElement('label');
      lbl.textContent = labelText;
      grp.appendChild(lbl);
      let inp;
      if (isTextarea) {
        inp = document.createElement('textarea');
        inp.rows = rows || 3;
        inp.textContent = value;
      } else {
        inp = document.createElement('input');
        inp.type = 'text';
        inp.value = value;
      }
      inp.id = id;
      grp.appendChild(inp);
      parent.appendChild(grp);
      return inp;
    }

    addField(body, 'শব্দ (Headword)', 'editHeadword', entry.headword || '', false);
    addField(body, 'প্রতিবর্ণীকরণ (Transliteration)', 'editTranslit', entry.transliteration || '', false);
    addField(body, 'ধ্বনিতত্ত্ব (Phonetics)', 'editPhonetics', entry.phonetics || '', false);
    addField(body, 'ব্যুৎপত্তি (Etymology)', 'editEtymology', entry.etymology || '', false);

    const sensesHeading = document.createElement('h3');
    sensesHeading.style.cssText = 'font-size:0.95rem;margin:14px 0 8px;color:var(--accent)';
    sensesHeading.textContent = 'অর্থসমূহ';
    body.appendChild(sensesHeading);

    const sensesDiv = document.createElement('div');
    sensesDiv.id = 'sensesContainer';
    body.appendChild(sensesDiv);

    senses.forEach((s, si) => {
      const sg = document.createElement('div');
      sg.className = 'sense-edit-group';
      sg.id = 'senseGroup' + si;
      const h4 = document.createElement('h4');
      h4.textContent = 'অর্থ ' + (si + 1);
      sg.appendChild(h4);
      addField(sg, 'পদ (Part of Speech)', 'editPos' + si, s.part_of_speech || '', false);
      addField(sg, 'সংজ্ঞা', 'editDef' + si, s.definition || '', true, 3);
      addField(sg, 'উদাহরণ (প্রতি লাইনে একটি)', 'editEx' + si, (s.examples || []).join('\n'), true, 2);
      addField(sg, 'পরস্পর-সম্পর্ক (কমা দিয়ে)', 'editCr' + si, (s.cross_references || []).join(', '), false);
      sensesDiv.appendChild(sg);
    });

    const addSenseBtn = document.createElement('button');
    addSenseBtn.className = 'btn btn-sm';
    addSenseBtn.style.cssText = 'background:#e0e0e0;color:#333;margin-top:6px';
    addSenseBtn.textContent = '+ অর্থ যোগ করুন';
    addSenseBtn.onclick = addSenseField;
    body.appendChild(addSenseBtn);

    addField(body, 'টীকা (Notes)', 'editNotes', entry.notes || '', true, 2);

    modal.appendChild(body);

    // Footer
    const footer = document.createElement('div');
    footer.className = 'modal-footer';

      revertBtn.textContent = '↩ মূল সংস্করণ';

function saveEntry(idx) {
  const entry = allEntries[idx];
  const key = getEntryKey(entry);
  const userName = getUserName();
  const now = new Date().toISOString();
  const originalHeadword = entry._originalHeadword || entry.headword;

  // Collect form data
  const newData = {
    headword: document.getElementById('editHeadword').value.trim(),
    transliteration: document.getElementById('editTranslit').value.trim(),
    phonetics: document.getElementById('editPhonetics').value.trim(),
    etymology: document.getElementById('editEtymology').value.trim(),
    notes: document.getElementById('editNotes').value.trim(),
    senses: [],
    source_page: entry.source_page,
  };

  const senseCount = document.getElementById('editModal')._senseCount || 0;
  for (let i = 0; i < senseCount; i++) {
    const posEl = document.getElementById(`editPos${i}`);
    if (!posEl) continue;
    const sense = {
      part_of_speech: posEl.value.trim(),
      definition: document.getElementById(`editDef${i}`).value.trim(),
      examples: document.getElementById(`editEx${i}`).value.trim().split('\n').filter(s => s.trim()),
      cross_references: document.getElementById(`editCr${i}`).value.trim().split(',').map(s => s.trim()).filter(Boolean),
    };
    if (sense.definition || sense.part_of_speech) {
      newData.senses.push(sense);
    }
  }
  if (!newData.senses.length && entry.senses && entry.senses.length) {
    newData.senses = entry.senses;
  }

  // Determine what changed
  const changes = [];
  for (const field of ['headword', 'transliteration', 'phonetics', 'etymology', 'notes']) {
    if ((newData[field] || '') !== (entry[field] || '')) {
      changes.push(field);
    }
  }
  if (JSON.stringify(newData.senses) !== JSON.stringify(entry.senses || [])) {
    changes.push('senses');
  }

  if (!changes.length) {
    closeEditModal();
    return;
  }

  // Save to server (JSON file) — primary storage
  fetch('/api/save-entry', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      originalHeadword: originalHeadword,
      source_page: entry.source_page,
      data: newData,
      user: userName,
    })
  }).then(r => r.json()).then(res => {
    if (!res.ok) console.warn('Server save warning:', res.message);
  }).catch(err => {
    console.warn('Server save failed (offline?):', err);
  });

  // Also save to localStorage as backup
  const edits = getEdits();
  if (!edits[key]) {
    edits[key] = {
      originalHeadword: originalHeadword,
      source_page: entry.source_page,
      versions: []
    };
  }
  edits[key].versions.push({
    date: now,
    user: userName,
    changes: changes,
    data: { ...newData }
  });
  saveEdits(edits);

  // Apply to in-memory entry
  Object.assign(entry, newData);
  entry._edited = true;
  entry._originalHeadword = originalHeadword;

  // Re-sort and re-group
  allEntries.sort((a, b) => compareBengali(a.headword || '', b.headword || ''));
  letterGroups = {};
  for (const e of allEntries) {
    const hw = e.headword || '';
    if (!hw) continue;
    const first = hw[0];
    if (!letterGroups[first]) letterGroups[first] = [];
    letterGroups[first].push(e);
  }

  // Update stats
  const editCount = Object.keys(edits).length;
  document.getElementById('statsText').textContent = `${allEntries.length} শব্দ · ${editCount} সম্পাদিত`;

  closeEditModal();

  // Re-render current view
  bookRendered = false;
  const q = document.getElementById('searchInput').value.trim();
  if (q) performSearch(q);
  else showAllEntries();
}

function revertEntry(idx) {
  if (!confirm('এই শব্দটি মূল সংস্করণে ফিরিয়ে আনতে চান?')) return;

  const entry = allEntries[idx];
  const key = getEntryKey(entry);

  // Find original
  const orig = originalEntries.find(e =>
    (e.headword === (entry._originalHeadword || entry.headword)) &&
    e.source_page === entry.source_page
  );
  if (!orig) { alert('মূল এন্ট্রি পাওয়া যায়নি।'); return; }

  // Revert on server (JSON file)
  fetch('/api/revert-entry', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      headword: entry._originalHeadword || entry.headword,
      source_page: entry.source_page,
      originalData: orig,
    })
  }).then(r => r.json()).then(res => {
    if (!res.ok) console.warn('Server revert warning:', res.message);
  }).catch(err => {
    console.warn('Server revert failed (offline?):', err);
  });

  // Remove from localStorage edits
  const edits = getEdits();
  delete edits[key];
  saveEdits(edits);

  // Restore original data
  const origCopy = JSON.parse(JSON.stringify(orig));
  origCopy._originalHeadword = orig.headword;
  Object.keys(entry).forEach(k => { if (k !== '_originalHeadword') delete entry[k]; });
  Object.assign(entry, origCopy);
  delete entry._edited;

  closeEditModal();

  // Re-render
  bookRendered = false;
  const q = document.getElementById('searchInput').value.trim();
  if (q) performSearch(q);
  else showAllEntries();
}

function showHistory(idx) {
  const entry = allEntries[idx];
  const key = getEntryKey(entry);
  const edits = getEdits();
  const record = edits[key];

  let html = '';
  if (!record || !record.versions || !record.versions.length) {
    html = '<p style="color:#888;text-align:center;padding:20px">কোনো সম্পাদনার ইতিহাস নেই।</p>';
  } else {
    html = `<p style="font-size:0.85rem;color:#666;margin-bottom:10px">মোট ${record.versions.length}টি সংস্করণ</p>`;
    // Show newest first
    for (let i = record.versions.length - 1; i >= 0; i--) {
      const v = record.versions[i];
      const d = new Date(v.date);
      const dateStr = d.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' })
        + ' ' + d.toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' });
      html += `<div class="history-item">`;
      html += `<div class="history-meta"><strong>${esc(v.user || 'অজানা')}</strong> · ${dateStr}</div>`;
      html += `<div class="history-changes">পরিবর্তিত: ${v.changes.map(c => `<span class="field-name">${c}</span>`).join(', ')}</div>`;
      html += `</div>`;
    }
  }

  // Replace modal body with history
  const body = document.querySelector('.modal-body');
  if (body) {
    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <button class="btn btn-sm" style="background:#e0e0e0;color:#333" onclick="openEditModal(${idx})">← সম্পাদনায় ফিরুন</button>
        <h3 style="font-size:1rem;color:var(--accent)">📋 সম্পাদনার ইতিহাস</h3>
      </div>
      ${html}`;
  }
}

// ─── Export / Import Edits ──────────────────────────────────────────
function exportEdits() {
  const edits = getEdits();
  const count = Object.keys(edits).length;
  if (!count) { alert('কোনো সম্পাদনা রপ্তানি করার নেই।'); return; }

  const exportData = {
    exportDate: new Date().toISOString(),
    exportedBy: getUserName(),
    version: 1,
    entryCount: count,
    edits: edits
  };

  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `dict_edits_${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importEdits(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.edits) throw new Error('Invalid format');

      const existing = getEdits();
      let imported = 0;
      for (const [key, record] of Object.entries(data.edits)) {
        if (!existing[key]) {
          existing[key] = record;
          imported += record.versions ? record.versions.length : 0;
        } else {
          // Merge versions (avoid duplicates by date)
          const existingDates = new Set(existing[key].versions.map(v => v.date));
          for (const v of (record.versions || [])) {
            if (!existingDates.has(v.date)) {
              existing[key].versions.push(v);
              imported++;
            }
          }
          // Sort by date
          existing[key].versions.sort((a, b) => a.date.localeCompare(b.date));
        }
      }

      saveEdits(existing);
      alert(`${imported}টি সংস্করণ আমদানি হয়েছে। পৃষ্ঠা পুনরায় লোড হচ্ছে...`);
      location.reload();
    } catch (err) {
      alert('ফাইল পড়া যায়নি: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── Book Mode ──────────────────────────────────────────────────────
function renderBook() {
  if (bookRendered) return;

  const letters = Object.keys(letterGroups).sort((a, b) => {
    const ia = BN_ORDER.indexOf(a);
    const ib = BN_ORDER.indexOf(b);
    return (ia >= 0 ? ia : 999) - (ib >= 0 ? ib : 999);
  });

  const navHtml = letters.map(l =>
    `<button class="letter-btn" onclick="scrollToLetter('${l}')" title="${letterGroups[l].length} শব্দ">${l}</button>`
  ).join('');
  document.getElementById('letterNav').innerHTML = navHtml;

  let bookHtml = '';
  for (const letter of letters) {
    const entries = letterGroups[letter];
    bookHtml += `<div class="letter-section" id="letter-${letter}">`;
    bookHtml += `<div class="letter-heading">${letter} <span style="font-size:0.7em;font-weight:400;color:#888888">(${entries.length})</span></div>`;

    for (const entry of entries) {
      bookHtml += renderBookEntry(entry);
    }
    bookHtml += `</div>`;
  }

  document.getElementById('bookContent').innerHTML = bookHtml;
  bookRendered = true;
}

function renderBookEntry(entry) {
  const idx = allEntries.indexOf(entry);
  const hw = entry.headword || '';
  const tr = entry.transliteration || '';
  const ph = entry.phonetics || '';
  const etym = entry.etymology || '';
  const senses = entry.senses || [];
  const notes = entry.notes || '';
  const isEdited = !!entry._edited;

  let html = `<div class="book-entry${isEdited ? ' edited' : ''}">`;
  html += `<span class="book-headword">${esc(hw)}</span>`;
  html += `<button class="speak-btn" onclick="speak('${escAttr(hw)}','${escAttr(ph)}')" title="উচ্চারণ শুনুন">&#128264;</button>`;
  html += `<button class="edit-btn" onclick="openEditModal(${idx})" title="সম্পাদনা করুন">✏️</button>`;
  if (isEdited) html += `<span class="edited-badge">সম্পাদিত</span>`;
  if (tr) html += `<span class="book-translit">${esc(tr)}</span>`;
  if (ph) html += `<span class="book-phonetics">/${esc(ph)}/</span>`;
  if (etym) html += ` <span class="book-etymology">${esc(etym)}</span>`;

  for (const s of senses) {
    html += `<div class="book-sense">`;
    if (s.part_of_speech) html += `<span class="book-pos">${esc(s.part_of_speech)}</span> `;
    if (s.definition) html += `<span class="book-def">${esc(s.definition)}</span>`;
    if (s.raw_text) html += `<span class="book-def">${esc(s.raw_text)}</span>`;
    html += `</div>`;

    if (s.examples) {
      for (const ex of s.examples) {
        html += `<div class="book-example">${esc(ex)}</div>`;
      }
    }
    if (s.cross_references && s.cross_references.length) {
      html += `<div class="book-crossref">দ্র. ${s.cross_references.map(
        cr => `<a onclick="searchWord('${escAttr(cr)}')" style="color:#c70000;text-decoration:none;border-bottom:1px solid currentColor;cursor:pointer">${esc(cr)}</a>`
      ).join(', ')}</div>`;
    }
  }

  if (notes) html += `<div class="book-notes">📝 ${esc(notes)}</div>`;
  if (entry.source_page) {
    const pg = entry.source_page;
    const pgNum = pg.replace('IMG_0', '').replace('IMG_', '');
    html += `<div class="source-page"><a href="Images/Barak Upatyakar Ancholik Bhashar Abhidhan O Bhashatatwa - Copy/${pg}.jpg" target="_blank" title="মূল পৃষ্ঠা দেখুন">Source page ${pgNum}</a></div>`;
  }
  html += `</div>`;
  return html;
}

function scrollToLetter(letter) {
  const el = document.getElementById('letter-' + letter);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
    const btn = [...document.querySelectorAll('.letter-btn')].find(b => b.textContent.trim() === letter);
    if (btn) btn.classList.add('active');
  }
}

// ─── Mode Switching ─────────────────────────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('bookMode').style.display = mode === 'book' ? 'block' : 'none';
  document.getElementById('prabadMode').style.display = mode === 'prabad' ? 'block' : 'none';
  document.getElementById('btnBook').classList.toggle('active', mode === 'book');
  document.getElementById('btnPrabad').classList.toggle('active', mode === 'prabad');
if (mode === 'book') {
    renderBook();
    const q = document.getElementById('searchInput').value.trim();
    document.getElementById('letterNav').style.display = q ? 'none' : 'flex';
    document.getElementById('searchInput').focus();
  } else if (mode === 'prabad') {
    loadPrabad();
    document.getElementById('prabadSearch').focus();
  }
}

// ─── Back to Top Button ─────────────────────────────────────────────
window.addEventListener('scroll', () => {
  document.getElementById('backToTop').style.display = window.scrollY > 400 ? 'block' : 'none';

  if (currentMode === 'book') {
    const sections = document.querySelectorAll('.letter-section');
    let activeLetter = '';
    for (const sec of sections) {
      if (sec.getBoundingClientRect().top <= 150) {
        activeLetter = sec.id.replace('letter-', '');
      }
    }
    if (activeLetter) {
      document.querySelectorAll('#letterNav .letter-btn').forEach(b => {
        b.classList.toggle('active', b.textContent.trim() === activeLetter);
      });
    }
  }
  if (currentMode === 'prabad') {
    const sections = document.querySelectorAll('.prabad-section');
    let activeSec = '';
    for (const sec of sections) {
      if (sec.getBoundingClientRect().top <= 150) {
        activeSec = sec.id.replace('prabad-sec-', '');
      }
    }
    if (activeSec) {
      document.querySelectorAll('#prabadNav .letter-btn').forEach(b => {
        b.classList.toggle('active', b.textContent.trim() === activeSec);
      });
    }
  }
});

// ─── Keyboard shortcut ──────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  // Close modal on Escape
  if (e.key === 'Escape' && document.getElementById('editModal')) {
    closeEditModal();
    return;
  }
  if (e.key === '/' && currentMode === 'book' && document.activeElement !== document.getElementById('searchInput')) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape' && !document.getElementById('editModal') && currentMode === 'book') {
    document.getElementById('searchInput').value = '';

async function loadPrabad() {
  if (prabadEntries.length > 0) {
    if (!prabadRendered) renderPrabad();
    return;
  }
  document.getElementById('prabadContent').innerHTML = '<div class="loading"><div class="spinner"></div><br>প্রবাদ লোড হচ্ছে...</div>';
  try {
    const resp = await fetch('prabad/ParsedJSON/all_prabad.json');
    if (!resp.ok) throw new Error('Failed to load prabad');
    prabadEntries = await resp.json();
    renderPrabad();
  } catch (err) {
    document.getElementById('prabadContent').innerHTML =
      '<div class="no-results">প্রবাদ লোড করতে ব্যর্থ।</div>';
  }
}

function renderPrabad(filterText) {
  const q = (filterText || '').trim().toLowerCase();
  let entries = prabadEntries;
  if (q) {
    entries = prabadEntries.filter(e => e.idiom.toLowerCase().includes(q));
  }

  // Group by section
  const sectionOrder = [];
  const sectionMap = {};
  for (const e of entries) {
    const sec = e.section || '—';
    if (!sectionMap[sec]) {
      sectionMap[sec] = [];
      sectionOrder.push(sec);
    }
    sectionMap[sec].push(e);
  }

  // Sort sections in Bengali alphabetical order
  sectionOrder.sort((a, b) => {
    if (a === '—') return 1;
    if (b === '—') return -1;
    return compareBengali(a, b);
  });

  // Sort entries within each section alphabetically by idiom text
  for (const sec of sectionOrder) {
    sectionMap[sec].sort((a, b) => compareBengali(a.idiom, b.idiom));
  }

  // Section nav (shared letterNav)
  const nav = document.getElementById('letterNav');
  if (!q) {
    const navHtml = sectionOrder.map(s =>
      `<button claprabad's own nav)
  const nav = document.getElementById('prabad
    nav.innerHTML = navHtml;
    nav.style.display = 'flex';
  } else {
    nav.style.display = 'none';
  }

  // Stats
  document.getElementById('prabadStats').textContent = q
    ? `${entries.length} / ${prabadEntries.length} প্রবাদ`
    : `${prabadEntries.length} প্রবাদ`;

  // Render
  let html = '';
  for (const sec of sectionOrder) {
    html += `<div class="prabad-section" id="prabad-sec-${sec}">`;
    html += `<div class="prabad-section-heading">${esc(sec)} <span style="font-size:0.55em;font-weight:400;color:#888">(${sectionMap[sec].length})</span></div>`;
    for (const e of sectionMap[sec]) {
      const idiomHtml = q ? highlightText(esc(e.idiom), q) : esc(e.idiom);
      const pg = e.source_page || '';
      const pgNum = pg.replace('IMG_0', '').replace('IMG_', '');
      html += `<div class="prabad-item">`;
      html += `<span class="prabad-sno">${toBengaliNum(e.sno)}</span>`;
      html += `<span class="prabad-text">${idiomHtml}</span>`;
      if (pg) {
        html += `<span class="prabad-source"><a href="Images/Barak%20Upatyakar%20Ancholik%20Bhashar%20Abhidhan%20O%20Bhashatatwa%20-%20Copy/${pg}.jpg" target="_blank" title="মূল পৃষ্ঠা">${pgNum}</a></span>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  document.getElementById('prabadContent').innerHTML = html;
  if (!q) prabadRendered = true;
}

function toBengaliNum(n) {
  const BN = '০১২৩৪৫৬৭৮৯';
  return String(n).replace(/[0-9]/g, d => BN[d]);
}

function highlightText(html, q) {
  if (!q) return html;
  const regex = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return html.replace(regex, '<span class="highlight">$1</span>');
}

// ─── Speak Function ─────────────────────────────────────────────────
const PHON_TO_SPEAKABLE = {
  'ɔ': 'o', 'ʒ': 'j', '∫': 'sh', 'ṭ': 't', 'ḍ': 'd',
  'ṛ': 'r', 'ɦ': 'h', 'ŋ': 'ng', 'c∫': 'ch', 'c∫h': 'chh'
};

function phonToSpeakable(ph) {
  let s = ph;
  s = s.replace(/c∫h/g, 'chh');
  s = s.replace(/c∫/g, 'ch');
  for (const [from, to] of Object.entries(PHON_TO_SPEAKABLE)) {
    if (from.length === 1) s = s.split(from).join(to);
  }
  return s;
}

function speak(headword, phonetics) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const voices = window.speechSynthesis.getVoices();
  const bnVoice = voices.find(v => v.lang.startsWith('bn'));

  const utt = new SpeechSynthesisUtterance();
  if (bnVoice) {
    utt.voice = bnVoice;
    utt.lang = 'bn-IN';
    utt.text = headword;
  } else {
    utt.lang = 'bn-IN';
    utt.text = phonetics ? phonToSpeakable(phonetics) : headword;
  }
  utt.rate = 0.85;
  window.speechSynthesis.speak(utt);
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
